    function main() {

        const canvas = document.querySelector('#c');
        const renderer = new THREE.WebGLRenderer({
            antialias: true,

            logarithmicDepthBuffer: true,

        const fov = 45;
        const aspect = 2; // the canvas default

        const far = 500;

        camera.position.set(0, 0, 20);

        const controls = new OrbitControls(camera, canvas);
        controls.target.set(0, 0, 0);
        controls.update();

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#DEFEFF');

        {
            const color = 0xFFFFF4;
            const intensity = 1;

            light.position.set(-1, 2.5, 0);
            light.target.position.set(-10, 0, 0);
            scene.add(light);
            scene.add(light.target);
            // const helper = new THREE.DirectionalLightHelper(light);
            // scene.add(helper);
        }

        {
            const color = 0xFFFFE9;

        }

        {
            const color = 0xFF8080;

            light.position.set(1.75, 0, 0);

        }

        {

            const distance = 20;
            const angle = 35;
            const penumbra = 0.15;
            const light = new THREE.SpotLight(color, intensity, distance, angle,
                penumbra
            );
            light.position.set(-1.95, 1.5, 0);
            light.target.position.set(-20, -2.5, 0);
            scene.add(light);
            scene.add(light.target);
            // const helper = new THREE.SpotLightHelper(light);
            // scene.add(helper);
        }

        {
            const geometry = new THREE.BoxGeometry(75, 0.25, 10);
            const color = 0x0E0E1B;
            const material = new THREE.MeshPhongMaterial({ color });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, -1.65, 0);
            scene.add(cube);
        }

        {
            const geometry = new THREE.BoxGeometry(75, 0.5, 5);
            const color = 0x5C5C5C;
            const material = new THREE.MeshPhongMaterial({ color });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, -1.65, 7.5);
            scene.add(cube);
        }

        {
            const geometry = new THREE.BoxGeometry(75, 0.5, 5);

            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, -1.65, -7.5);
            scene.add(cube);
        }

        {
            {
                const radiusTop = 0.25;
                const radiusBottom = 0.25;
                const height = 8;
                const radialSegments = 12;
                const geometry = new THREE.CylinderGeometry(
                    radiusTop, radiusBottom, height, radialSegments);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cylinder = new THREE.Mesh(geometry, material);
                cylinder.position.set(3.5, 2.5, -7.5);
                scene.add(cylinder);
            }

            {
                const radius = 0.2;
                const widthSegments = 16;
                const heightSegments = 12;
                const geometry = new THREE.SphereGeometry(radius, widthSegments, heightSegments);
                const color = 0xFFFF80;
                const material = new THREE.MeshPhongMaterial({ color });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(3.5, 6.5, -6.5);
                scene.add(sphere);
            }

            {
                const geometry = new THREE.BoxGeometry(1, 0.5, 2);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(3.5, 6.75, -7);
                scene.add(cube);
            }

            {
                const color = 0xFFFFCA;
                const intensity = 20;
                const distance = 20;
                const light = new THREE.PointLight(color, intensity, distance);
                light.position.set(3.5, 6, -6.5);
                scene.add(light);
                // const helper = new THREE.PointLightHelper(light);
                // scene.add(helper);
            }
        }

        {
            {
                const radiusTop = 0.25;
                const radiusBottom = 0.25;
                const height = 8;
                const radialSegments = 12;
                const geometry = new THREE.CylinderGeometry(
                    radiusTop, radiusBottom, height, radialSegments);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cylinder = new THREE.Mesh(geometry, material);
                cylinder.position.set(-28, 2.5, -7.5);
                scene.add(cylinder);
            }

            {
                const radius = 0.2;
                const widthSegments = 16;
                const heightSegments = 12;
                const geometry = new THREE.SphereGeometry(radius, widthSegments, heightSegments);
                const color = 0xFFFF80;
                const material = new THREE.MeshPhongMaterial({ color });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(-28, 6.5, -6.5);
                scene.add(sphere);
            }

            {
                const geometry = new THREE.BoxGeometry(1, 0.5, 2);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(-28, 6.75, -7);
                scene.add(cube);
            }

            {
                const color = 0xFFFFCA;
                const intensity = 20;
                const distance = 20;
                const light = new THREE.PointLight(color, intensity, distance);
                light.position.set(-28, 6, -6.5);
                scene.add(light);
                // const helper = new THREE.PointLightHelper(light);
                // scene.add(helper);
            }
        }

        {
            {
                const radiusTop = 0.25;
                const radiusBottom = 0.25;
                const height = 8;
                const radialSegments = 12;
                const geometry = new THREE.CylinderGeometry(
                    radiusTop, radiusBottom, height, radialSegments);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cylinder = new THREE.Mesh(geometry, material);
                cylinder.position.set(35, 2.5, -7.5);
                scene.add(cylinder);
            }

            {
                const radius = 0.2;
                const widthSegments = 16;
                const heightSegments = 12;
                const geometry = new THREE.SphereGeometry(radius, widthSegments, heightSegments);
                const color = 0xFFFF80;
                const material = new THREE.MeshPhongMaterial({ color });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(35, 6.5, -6.5);
                scene.add(sphere);
            }

            {
                const geometry = new THREE.BoxGeometry(1, 0.5, 2);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(35, 6.75, -7);
                scene.add(cube);
            }

            {
                const color = 0xFFFFCA;
                const intensity = 20;
                const distance = 20;
                const light = new THREE.PointLight(color, intensity, distance);
                light.position.set(35, 6, -6.5);
                scene.add(light);
                // const helper = new THREE.PointLightHelper(light);
                // scene.add(helper);
            }
        }

        {
            {
                const radiusTop = 0.25;
                const radiusBottom = 0.25;
                const height = 8;
                const radialSegments = 12;
                const geometry = new THREE.CylinderGeometry(
                    radiusTop, radiusBottom, height, radialSegments);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cylinder = new THREE.Mesh(geometry, material);
                cylinder.position.set(19.25, 2.5, 7.5);
                scene.add(cylinder);
            }

            {
                const radius = 0.2;
                const widthSegments = 16;
                const heightSegments = 12;
                const geometry = new THREE.SphereGeometry(radius, widthSegments, heightSegments);
                const color = 0xFFFF80;
                const material = new THREE.MeshPhongMaterial({ color });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(19.25, 6.5, 6.5);
                scene.add(sphere);
            }

            {
                const geometry = new THREE.BoxGeometry(1, 0.5, 2);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(19.25, 6.75, 7);
                scene.add(cube);
            }

            {
                const color = 0xFFFFCA;
                const intensity = 20;
                const distance = 20;
                const light = new THREE.PointLight(color, intensity, distance);
                light.position.set(19.25, 6, 6.5);
                scene.add(light);
                // const helper = new THREE.PointLightHelper(light);
                // scene.add(helper);
            }
        }

        {
            {
                const radiusTop = 0.25;
                const radiusBottom = 0.25;
                const height = 8;
                const radialSegments = 12;
                const geometry = new THREE.CylinderGeometry(
                    radiusTop, radiusBottom, height, radialSegments);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cylinder = new THREE.Mesh(geometry, material);
                cylinder.position.set(-12.25, 2.5, 7.5);
                scene.add(cylinder);
            }

            {
                const radius = 0.2;
                const widthSegments = 16;
                const heightSegments = 12;
                const geometry = new THREE.SphereGeometry(radius, widthSegments, heightSegments);
                const color = 0xFFFF80;
                const material = new THREE.MeshPhongMaterial({ color });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(-12.25, 6.5, 6.5);
                scene.add(sphere);
            }

            {
                const geometry = new THREE.BoxGeometry(1, 0.5, 2);
                const color = 0x5C5C5C;
                const material = new THREE.MeshPhongMaterial({ color });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(-12.25, 6.75, 7);
                scene.add(cube);
            }

            {
                const color = 0xFFFFCA;
                const intensity = 20;
                const distance = 20;
                const light = new THREE.PointLight(color, intensity, distance);
                light.position.set(-12.25, 6, 6.5);
                scene.add(light);
                // const helper = new THREE.PointLightHelper(light);
                // scene.add(helper);
            }
        }

        const boxWidth = 1;
        const boxHeight = 1;
        const boxDepth = 1;
        const geometry = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);

        const loader = new THREE.TextureLoader();
        const texture = loader.load('stone.png');
        texture.colorSpace = THREE.SRGBColorSpace;

        function makeInstance(geometry, color, textureNum, x, y, z) {

            let material;
            if (textureNum == 0) {
                material = new THREE.MeshPhongMaterial({ color });
            } else {
                material = new THREE.MeshPhongMaterial({
                    map: texture
                });
            }

            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            cube.position.x = x;
            cube.position.y = y;
            cube.position.z = z;

            return cube;

        }

        const cubes = [
            makeInstance(geometry, 0x44aa88, 1, -4, 0, -6),
            makeInstance(geometry, 0x8080ff, 1, -4, 0, 6),
            // makeInstance(geometry, 0xaa8844, 2, 0),
        ];

        // VR-Mobil by Vladimir Ilic [CC-BY] 
        // (https://creativecommons.org/licenses/by/3.0/) 
        // via Poly Pizza (https://poly.pizza/m/6XXj6DSBb08)
        {
            const mtlLoader = new MTLLoader();
            mtlLoader.load('VR-Mobil/materials.mtl', (mtl) => {
                mtl.preload();
                const objLoader = new OBJLoader();
                objLoader.setMaterials(mtl);
                objLoader.load('VR-Mobil/model.obj', (root) => {
                    scene.add(root);
                });
            });
        }

        {
            const loader = new THREE.TextureLoader();
            const texture = loader.load(
                'citrus_orchard_puresky.jpg',
                () => {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    texture.colorSpace = THREE.SRGBColorSpace;
                    scene.background = texture;

                });
        }

        function resizeRendererToDisplaySize(renderer) {

            const canvas = renderer.domElement;
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            const needResize = canvas.width !== width || canvas.height !== height;
            if (needResize) {
                renderer.setSize(width, height, false);
            }

            return needResize;

        }

        function render(time) {

            time *= 0.001;

            if (resizeRendererToDisplaySize(renderer)) {
                const canvas = renderer.domElement;
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
            }

            cubes.forEach((cube, index) => {

                const speed = .2 + index * .1;
                const rot = time * speed;
                cube.rotation.x = rot;
                cube.rotation.y = rot;

            });

            renderer.render(scene, camera);

            requestAnimationFrame(render);

        }

        requestAnimationFrame(render);

    }

    main();

</script>
