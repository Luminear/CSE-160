<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Assignment 4</title>
</head>

<body onload="main()">
    <canvas id="webgl" width="700" height="500">
        Please use a browser that supports "canvas"
    </canvas>

    <br>

    <p id="numdot">XXX</p>

    <p>Normals</p>
    <button type="button" id="normalOn">ON</button>
    <button type="button" id="normalOff">OFF</button>

    <p>Light
        <button type="button" id="lightOn">ON</button>
        <button type="button" id="lightOff">OFF</button>
    </p>

    <p>
        Light X<input type="range" min="-500" max="500" value="0" class="slider" id="lightSlideX">
        Light Y<input type="range" min="-75" max="250" value="100" class="slider" id="lightSlideY">
        Light Z<input type="range" min="-350" max="350" value="-200" class="slider" id="lightSlideZ">
    </p>

    <p>
        Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlide">
        Green <input type="range" min="0" max="100" value="100" class="slider" id="greenSlide">
        Blue <input type="range" min="0" max="100" value="100" class="slider" id="blueSlide">
    </p>

    <p>Light Animation
        <button type="button" id="lightAnimOn">ON</button>
        <button type="button" id="lightAnimOff">OFF</button>
    </p>

    <script src="lib/cuon-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="Cube.js"></script>
    <script src="Sphere.js"></script>
    <script src="asgn4.js"></script>
</body>

</html>
