<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, 
    initial-scale=1.0, user-scalable=yes">
    <title>Assignment 5</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
</body>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@v0.183.2/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.183.2/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

    function main() {

        const canvas = document.querySelector('#c');
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            canvas,
            logarithmicDepthBuffer: true,
        });

        const fov = 45;
        const aspect = 2; // the canvas default
        const near = 0.1;
        const far = 500;
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.set(0, 0, 10);

        const controls = new OrbitControls(camera, canvas);
        controls.target.set(0, 0, 0);
        controls.update();

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#DEFEFF');

        {
            const color = 0xFFFFF4;
            const intensity = 1.75;
            const dLight = new THREE.DirectionalLight(color, intensity);
            dLight.position.set(2, 2, 3);
            // dLight.target.position.set(-5, 0, 0);
            scene.add(dLight);
            // scene.add(dLight.target);
        }

        {
            const color = 0xFFFFE9;
            const intensity = 0.20;
            const ambLight = new THREE.AmbientLight(color, intensity);
            scene.add(ambLight);
        }

        {
            const color = 0xFF8080;
            const intensity = 20;
            const distance = 1;
            const light = new THREE.PointLight(color, intensity, distance);
            light.position.set(1.75, 0, 0);
            scene.add(light);
        }

        {
            const color = 0xFFF8F1;
            const intensity = 50;
            const distance = 5;
            const angle = 35;
            const penumbra = 1;
            const light = new THREE.SpotLight(color, intensity, distance, angle,
                penumbra
            );
            light.position.set(-1.95, 1.5, 0);
            light.target.position.set(-5, 1, 0);
            scene.add(light);
            scene.add(light.target);
        }

        const boxWidth = 1;
        const boxHeight = 1;
        const boxDepth = 1;
        const geometry = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);

        const loader = new THREE.TextureLoader();
        const texture = loader.load('stone.png');
        texture.colorSpace = THREE.SRGBColorSpace;

        function makeInstance(geometry, color, textureNum, x, y, z) {

            let material;
            if (textureNum == 0) {
                material = new THREE.MeshPhongMaterial({ color });
            } else {
                material = new THREE.MeshPhongMaterial({
                    map: texture
                });
            }

            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            cube.position.x = x;
            cube.position.y = y;
            cube.position.z = z;

            return cube;

        }

        const cubes = [
            makeInstance(geometry, 0x44aa88, 1, -4, 1.75, 0),
            makeInstance(geometry, 0x8080ff, 0, -4, 0, 0),
            // makeInstance(geometry, 0xaa8844, 2, 0),
        ];

        // VR-Mobil by Vladimir Ilic [CC-BY] 
        // (https://creativecommons.org/licenses/by/3.0/) 
        // via Poly Pizza (https://poly.pizza/m/6XXj6DSBb08)
        {
            const mtlLoader = new MTLLoader();
            mtlLoader.load('VR-Mobil/materials.mtl', (mtl) => {
                mtl.preload();
                const objLoader = new OBJLoader();
                objLoader.setMaterials(mtl);
                objLoader.load('VR-Mobil/model.obj', (root) => {
                    scene.add(root);
                });
            });
        }

        {
            const loader = new THREE.TextureLoader();
            const texture = loader.load(
                'citrus_orchard_puresky.jpg',
                () => {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    texture.colorSpace = THREE.SRGBColorSpace;
                    scene.background = texture;

                });
        }

        function resizeRendererToDisplaySize(renderer) {

            const canvas = renderer.domElement;
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            const needResize = canvas.width !== width || canvas.height !== height;
            if (needResize) {
                renderer.setSize(width, height, false);
            }

            return needResize;

        }

        function render(time) {

            time *= 0.001;

            if (resizeRendererToDisplaySize(renderer)) {
                const canvas = renderer.domElement;
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
            }

            cubes.forEach((cube, index) => {

                const speed = .2 + index * .1;
                const rot = time * speed;
                cube.rotation.x = rot;
                cube.rotation.y = rot;

            });

            renderer.render(scene, camera);

            requestAnimationFrame(render);

        }

        requestAnimationFrame(render);

    }

    main();

</script>

</html>
